services:
  - type: web
    name: documind-api
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://documindai-azure.vercel.app,http://localhost:5173"